; Xdebug 3 configuration for local development
; After installing Xdebug, find your php.ini with: php --ini
; Then include this file or copy the settings into php.ini.
;
; On macOS with Homebrew PHP, create a file at:
;   /opt/homebrew/etc/php/<version>/conf.d/99-xdebug.ini
; and paste the contents below.

[xdebug]
zend_extension = xdebug.so
xdebug.mode = debug
xdebug.start_with_request = yes
xdebug.client_host = 127.0.0.1
xdebug.client_port = 9003
xdebug.log_level = 0
